<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <link rel ="stylesheet" href ="pseudoElement.css">
        <title>Học pseudo element</title>
    </head>
    <body>
        <h3>Sơn Tùng MT-P</h3>
        <P>Sơn Tùng MTP là ca sĩ top 1, tác phẩm đầu tiên anh cho ra mắt là ca khúc Cơn Mưa Ngang Qua</P>

        <ol id = "Music">
            <li id="Piano">Piano</li>
            <li id="organ">Organ</li>
            <li id="Guitar">Guitar</li>
            <li id="Cajon">Cajon</li>
        </ol>
        <a href="#" class="menu">Home</a>

        <button class="btn">Click me</button>

        <div class = card>Hello</div>
    </body>
</html>

<!-- pseudo element tutorial
     Syntax :   selector::pseudoElement
     Các pseudoElement quan trọng : 
     + first-letter : chữ cái đầu tiên 
     + first-line; dòng đầu tiên
     + ::before : phía trước element 
     + :: after : phía sau element 
     // lưu ý : before và after phải luôn có : content : ""
     // tính năng Transition: // giúp animation mượt mà 
     text-decoration : none // dùng để tắt hiệu ứng mặc định
-->
